<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T⁴ GR | Enterprise Portfolio</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .neon-border { border: 1px solid rgba(0, 255, 135, 0.1); transition: 0.3s; }
        .neon-border:hover { border-color: #00ff87; box-shadow: 0 0 15px rgba(0, 255, 135, 0.1); }
        .bot-glow { box-shadow: inset 0 0 20px rgba(0, 255, 135, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const _S = supabase.createClient('https://wbodcgigcotmtyaggttib.supabase.co', 'Sb_publishable_VCTvAQ7VJJCqm-KTWdvi4g_Ca8Xq2fzeyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indib2RjZ2lnY290bXR5YWdndGliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzgyOTcsImV4cCI6MjA5MzU1NDI5N30.o_6dy-CwhhtvoCRsjIIy2HQKV5d7vQZuNYKeAwO36e8');

        const App = () => {
            const [projects, setProjects] = useState([]);
            const [input, setInput] = useState("");

            useEffect(() => {
                const fetchProjects = async () => {
                    const { data } = await _S.from('project_hub').select('*').order('created_at', {ascending: false});
                    setProjects(data || []);
                };
                fetchProjects();
                _S.channel('db-changes').on('postgres_changes', {event: '*', schema: 'public', table: 'project_hub'}, fetchProjects).subscribe();
            }, []);

            return (
                <div className="max-w-5xl mx-auto p-8 md:p-16">
                    <header className="flex justify-between items-center mb-20">
                        <div>
                            <h1 className="text-4xl font-black tracking-tighter">T⁴ SYSTEM</h1>
                            <p className="text-xs font-mono text-green-500 uppercase tracking-widest mt-1">Enterprise Architecture // South Africa</p>
                        </div>
                        <div className="text-right hidden md:block text-[10px] text-gray-600 font-mono">
                            LOC: JHB_GP<br/>SYS_VER: 4.0.1
                        </div>
                    </header>

                    {/* The Bot Admin Interface */}
                    <section className="mb-24">
                        <div className="bg-[#0f0f0f] border border-white/5 rounded-xl p-6 bot-glow">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                <span className="text-[10px] font-bold uppercase text-gray-400">System Intelligence Hub</span>
                            </div>
                            <div className="flex gap-4">
                                <input 
                                    className="flex-1 bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-green-500 transition-all"
                                    placeholder="Tell the bot to update projects, deploy assets, or modify registry..."
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                />
                                <button className="bg-white text-black px-8 py-3 rounded-lg text-xs font-bold uppercase hover:bg-green-500 transition-colors">Invoke</button>
                            </div>
                        </div>
                    </section>

                    {/* The Project Grid */}
                    <section>
                        <h2 className="text-xs font-bold uppercase text-gray-500 mb-8 border-l-2 border-green-500 pl-4 tracking-widest">Active Project Registry</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {projects.map(p => (
                                <div key={p.id} className="bg-[#0c0c0c] p-6 rounded-xl neon-border flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="text-[9px] font-mono text-green-500 bg-green-500/5 px-2 py-1 rounded tracking-tighter uppercase">{p.category}</span>
                                            <span className="text-[8px] text-gray-700 font-mono">v1.0</span>
                                        </div>
                                        <h3 className="text-xl font-bold mb-2 tracking-tight">{p.title}</h3>
                                        <p className="text-xs text-gray-500 leading-relaxed mb-6">{p.tagline}</p>
                                    </div>
                                    <button className="text-[10px] font-bold uppercase tracking-widest text-white/30 hover:text-green-500 transition-colors mt-auto self-start">Inspect Details</button>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="mt-32 pt-12 border-t border-white/5 text-[10px] text-gray-700 font-mono uppercase flex justify-between">
                        <span>Built for T⁴ GR // Registered Enterprise</span>
                        <span>Terminal: Stable</span>
                    </footer>
                </div>
            );
        };

            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
