/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ── THEME VARS ── */
:root{
  --bg:#000000;--surface:#0f0f0f;--surface2:#161616;--border:#2f2f2f;
  --accent:#1d9bf0;--accent2:#1a8cd8;--text:#e7e9ea;--muted:#71767b;
  --display:'Bebas Neue',sans-serif;--body:'IBM Plex Mono',monospace;--hero:'Syne',sans-serif;
  --radius:4px;--lh:1.65;
}
body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:var(--lh);overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}

.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.reveal.show{opacity:1;transform:none}
