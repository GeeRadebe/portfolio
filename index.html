<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T⁴ // PORTFOLIO</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #00ff87; font-family: 'Courier New', monospace; }
        .glass { background: rgba(10, 10, 10, 0.8); border: 1px solid #1a1a1a; }
        input, textarea { background: #000 !important; border: 1px solid #333 !important; color: #00ff87 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const _S = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        const App = () => {
            const [view, setView] = useState('main');
            const [data, setData] = useState({ certs: [], posts: [], media: [] });
            const [cmd, setCmd] = useState("");

            useEffect(() => {
                sync();
                _S.channel('any').on('postgres_changes',{event:'*',schema:'public'},sync).subscribe();
            }, []);

            async function sync() {
                const { data: certs } = await _S.from('certs').select('*');
                const { data: posts } = await _S.from('posts').select('*');
                setData({ certs: certs || [], posts: posts || [] });
            }

            const execBrain = async () => {
                // Post to your Edge Function (Claude)
                await fetch('YOUR_EDGE_FUNC_URL', { method: 'POST', body: JSON.stringify({ prompt: cmd }) });
                setCmd("");
            };

            return (
                <div className="p-4 max-w-xl mx-auto">
                    <nav className="flex justify-between mb-8 border-b border-white/10 pb-2 text-xs">
                        <span>T⁴_SYSTEM_v1.0</span>
                        <div className="space-x-4">
                            <button onClick={() => setView('main')}>[HOME]</button>
                            <button onClick={() => setView('admin')}>[ADMIN]</button>
                        </div>
                    </nav>

                    {view === 'main' ? (
                        <div className="space-y-8">
                            <section>
                                <h2 className="text-white mb-4">/CERTS</h2>
                                {data.certs.map(c => (
                                    <div key={c.id} className="glass p-3 mb-2 flex justify-between">
                                        <span>{c.title}</span>
                                        <span className="text-gray-600 text-xs">{c.date}</span>
                                    </div>
                                ))}
                            </section>

                            <section className="glass p-4 border-orange-900">
                                <h2 className="text-orange-500 mb-2">⚡ LIGHTNING_TIP</h2>
                                <code className="text-[10px] block mb-4">tediousguilty29@walletofsatoshi.com</code>
                                <button className="w-full bg-orange-600 text-black py-2 font-bold">GENERATE INVOICE</button>
                            </section>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            <h2 className="text-white">/ADMIN_SHELL</h2>
                            <textarea 
                                className="w-full h-40 p-3 text-sm focus:border-green-500 outline-none"
                                placeholder="Command: I got a new certificate from..."
                                value={cmd}
                                onChange={e => setCmd(e.target.value)}
                            />
                            <button onClick={execBrain} className="w-full py-3 bg-green-900 text-white border border-green-400">EXECUTE_CLAUDE_PARSE</button>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
